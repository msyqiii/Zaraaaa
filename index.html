<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zaraaa's Live Space 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=500;800&family=Rajdhani:wght=500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-shadow: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0d0614;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(244, 63, 94, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(232, 121, 249, 0.2) 0%, transparent 45%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 15px;
            color: #f8fafc;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .bg-particle {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 1;
            font-size: 1.3rem;
            animation: floatAway 5s linear infinite;
            opacity: 0.35;
        }
        @keyframes floatAway {
            0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) translateX(60px) rotate(360deg); opacity: 0; }
        }

        .dashboard {
            background: rgba(20, 10, 30, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            max-width: 460px;
            border-radius: 30px;
            padding: 30px 20px;
            border: 2px solid rgba(244, 63, 94, 0.4);
            box-shadow: 0 0 40px rgba(244, 63, 94, 0.2);
            text-align: center;
            position: relative;
            z-index: 10;
            margin: auto 0;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(45deg, #f43f5e, #e879f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: 1px;
            filter: drop-shadow(0 0 10px rgba(244, 63, 94, 0.6));
        }

        /* LIVE REALTIME CLOCK */
        .live-timer {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: #e879f9;
            background: rgba(232, 121, 249, 0.1);
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid rgba(232, 121, 249, 0.3);
            letter-spacing: 1px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: #f472b6;
            margin: 25px 0 12px 0;
            text-align: left;
            padding-left: 5px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mood-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .mood-box {
            background: rgba(45, 20, 55, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 12px 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mood-box span {
            display: block;
            font-size: 1.8rem;
            margin-bottom: 4px;
            transition: transform 0.2s;
        }

        .mood-box p {
            font-size: 0.85rem;
            font-weight: 700;
            color: #cbd5e1;
        }

        .mood-box:hover span { transform: scale(1.15); }

        .mood-box.active {
            border-color: #f43f5e;
            background: rgba(244, 63, 94, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.4);
        }

        .mood-box.active p { color: #fb7185; }

        .bucin-wrapper {
            background: rgba(35, 15, 45, 0.6);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(232, 121, 249, 0.3);
        }

        .bucin-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 700;
            color: #a1a1aa;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .bucin-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            border-radius: 20px;
            background: #251236;
            outline: none;
            cursor: pointer;
        }

        .bucin-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f43f5e, #e879f9);
            cursor: pointer;
            box-shadow: 0 0 15px #f43f5e;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-action {
            background: rgba(45, 20, 55, 0.5);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-action span { font-size: 2rem; }
        .btn-action:active { transform: translateY(2px); }

        .btn-action.radar { border-color: #e879f9; }
        .btn-action.emergency { border-color: #f43f5e; color: #fda4af; }

        .note-section {
            background: rgba(35, 15, 45, 0.6);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .note-input {
            width: 100%;
            border: 1px solid #3f3f46;
            background: #12061c;
            color: #fafafa;
            border-radius: 12px;
            padding: 12px;
            font-size: 1rem;
            resize: none;
            outline: none;
            margin-bottom: 12px;
        }

        .btn-send-note {
            background: linear-gradient(90deg, #e11d48, #f43f5e);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4);
        }

        .blast-particle {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            font-size: 1.5rem;
            animation: blastOutLite 1s ease-out forwards;
        }
        @keyframes blastOutLite {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(1.1) opacity: 0; }
        }

        .toast-container {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1c0a24;
            padding: 14px 28px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid #e879f9;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: max-content;
            max-width: 92vw;
        }
        .toast-container.show { top: 25px; }
        .toast-msg { font-size: 0.95rem; font-weight: 700; color: #fafafa; }
    </style>
</head>
<body>

    <div id="custom-toast" class="toast-container">
        <span id="toast-icon">✨</span>
        <span id="toast-msg" class="toast-msg">Terhubung!</span>
    </div>

    <div class="dashboard">
        <div class="header">
            <h1>ZARAAA'S LIVE ROOM 🌸</h1>
            <div class="live-timer" id="live-clock">LIVE // 00:00:00</div>
        </div>

        <div class="section-title">📊 STATUS AKTIVITAS</div>
        <div class="mood-container">
            <div class="mood-box" onclick="kirimMood(this, '✨ Lagi Happy / Bersantai')">
                <span>✨</span><p>Chill/Happy</p>
            </div>
            <div class="mood-box" onclick="kirimMood(this, '💄 Lagi Dandan / Siap-siap')">
                <span>💄</span><p>Get Ready</p>
            </div>
            <div class="mood-box" onclick="kirimMood(this, '📚 Belajar / Sibuk')">
                <span>📚</span><p>Focus Mode</p>
            </div>
            <div class="mood-box" onclick="kirimMood(this, '☕ Ngopi / Kulineran')">
                <span>☕</span><p>Me Time</p>
            </div>
            <div class="mood-box" onclick="kirimMood(this, '💔 Badmood / Don\'t Disturb 🥺')">
                <span>💔</span><p>Badmood</p>
            </div>
            <div class="mood-box" onclick="kirimMood(this, '🧹 Deep Cleaning / Beberes Rumah')">
                <span>🧹</span><p>Beberes</p>
            </div>
        </div>

        <div class="section-title">📈 TELEMETRI KANGEN CO-PILOT</div>
        <div class="bucin-wrapper">
            <div class="bucin-header">
                <span>Calm</span>
                <span id="bucin-val" style="color: #f43f5e; font-family: 'Orbitron', sans-serif; font-weight: 800;">50%</span>
                <span>Explode! 💖</span>
            </div>
            <input type="range" min="0" max="100" value="50" class="bucin-slider" id="love-slider" oninput="updateBucin(this.value)">
        </div>

        <div class="section-title">🛰️ MODUL GANGGU KILAT</div>
        <div class="action-grid">
            <div class="btn-action radar" onclick="pencetBuzzer(event)">
                <span>💖</span>
                <p>Ping Uqiii</p>
            </div>
            <div class="btn-action emergency" onclick="panggilDarurat(event)">
                <span>🚨</span>
                <p>Butuh Perhatian</p>
            </div>
        </div>

        <div class="section-title">💬 ENKRIPSI MEMO PAPAN PESAN</div>
        <div class="note-section">
            <textarea class="note-input" id="note-text" rows="2" placeholder="Tulis pesan kilat rahasia di sini..."></textarea>
            <button class="btn-send-note" onclick="kirimCatatan()">Kirim Memo Live ✨</button>
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = "https://discordapp.com/api/webhooks/1524831289415434354/EiC3hkhyhbO4yKvPVcvUT3YbOJRMBgsr-LbD5SgqHah9O8Wz9bgoQWFdHKdlqnYPqwCs";
        
        // FUNGSI JAM LIVE DETIKAN (Biar di HP terasa berjalan real-time tiap detik)
        function jalankanJamRealtime() {
            const clockEl = document.getElementById("live-clock");
            setInterval(() => {
                const sekarang = new Date();
                const jam = String(sekarang.getHours()).padStart(2, '0');
                const menit = String(sekarang.getMinutes()).padStart(2, '0');
                const detik = String(sekarang.getSeconds()).padStart(2, '0');
                clockEl.innerText = `LIVE // ${jam}:${menit}:${detik}`;
            }, 1000);
        }

        function dapatkanKunciHariIni() {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        }

        // STATE UTAMA
        let currentLevelKangen = "50%";
        let currentMood = "Belum Diatur 📋";
        let sinyalDarurat = "Kondisi Aman ✅";
        let loveBuzzerStatus = "Belum ada interaksi terbaru 📡";
        let catatanTerakhir = "Belum ada pesan terbaru 💬";
        let lastAction = "DASHBOARD REALTIME ONLINE";

        const teksPing = [
            "Zaraaa mendadak kangen berat sama Uqii! 👀🔥",
            "Sinyal gemas meluncur, Uqii wajib bales secepatnya! 🚀🌸",
            "Cuma mau nge-ping biar Uqii tahu kalau Zaraaa lagi mikirin Uqii 😜✨"
        ];

        const teksPerhatian = [
            "Zaraaa lagi butuh perhatian lebih/pukpuk secepatnya! 🥺💝",
            "SOS! Asupan manja Zaraaa menipis, Uqii dimohon merapat! 🚨🧸"
        ];

        function buatPartikelLatar() {
            if (document.visibilityState !== 'visible') return;
            const emojis = ["✨", "💖", "🌸"];
            const p = document.createElement("div");
            p.classList.add("bg-particle");
            p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 6000);
        }
        setInterval(buatPartikelLatar, 800);

        function showToast(message, icon = "✨") {
            const toast = document.getElementById("custom-toast");
            document.getElementById("toast-msg").innerText = message;
            document.getElementById("toast-icon").innerText = icon;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2000);
        }

        function buatLedakanPartikel(x, y, jumlah = 5) {
            for (let i = 0; i < jumlah; i++) {
                const p = document.createElement("div");
                p.classList.add("blast-particle");
                p.innerText = "💖";
                p.style.left = x + "px";
                p.style.top = y + "px";
                const sudut = Math.random() * Math.PI * 2;
                const jarak = Math.random() * 60 + 20;
                p.style.setProperty('--mx', Math.cos(sudut) * jarak + "px");
                p.style.setProperty('--my', Math.sin(sudut) * jarak + "px");
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            }
        }

        function updateBucin(val) {
            currentLevelKangen = val + "%";
            document.getElementById("bucin-val").innerText = currentLevelKangen;
        }

        // TRIGGER INSTAN BEGITU SLIDER DILEPAS
        document.getElementById("love-slider").addEventListener("change", function() {
            showToast(`Kangen disetel: ${currentLevelKangen}`, "📈");
            lastAction = "LEVEL KANGEN BERUBAH";
            sinkronkanKeDiscord();
        });

        function kirimMood(elemen, namaMood) {
            document.querySelectorAll('.mood-box').forEach(box => box.classList.remove('active'));
            elemen.classList.add('active');
            currentMood = namaMood;
            showToast(`Status: ${namaMood}`, "📊");
            lastAction = "MOOD TERKINI BERUBAH";
            sinkronkanKeDiscord();
        }

        function pencetBuzzer(e) {
            buatLedakanPartikel(e.clientX, e.clientY, 5);
            const teks = teksPing[Math.floor(Math.random() * teksPing.length)];
            loveBuzzerStatus = `💖 PING! "${teks}"`;
            showToast("Ping Terkirim!", "🛰️");
            lastAction = "RADAR TRANSMITTER PING";
            sinkronkanKeDiscord();
        }

        function panggilDarurat(e) {
            buatLedakanPartikel(e.clientX, e.clientY, 8);
            const teksSOS = teksPerhatian[Math.floor(Math.random() * teksPerhatian.length)];
            sinyalDarurat = `🚨 NEED ATTENTION: "${teksSOS}"`;
            showToast("SOS Diaktifkan!", "🚨");
            lastAction = "EMERGENCY CORE TRIGGERED";
            sinkronkanKeDiscord();
        }

        function kirimCatatan() {
            const area = document.getElementById("note-text");
            const isi = area.value.trim();
            if(!isi) return;
            catatanTerakhir = isi;
            showToast("Memo Terkirim!", "📌");
            area.value = "";
            lastAction = "PESAN LIVE MASUK";
            sinkronkanKeDiscord();
        }

        // INSTANT LIVE SYNC ENGINE (1 PESAN TERINTEGRASI)
        async function sinkronkanKeDiscord() {
            const sekarang = new Date();
            const waktuUpdate = sekarang.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const hariIni = dapatkanKunciHariIni();
            
            const hariTerakhirDisimpan = localStorage.getItem("zaraaa_last_date");
            let existingMessageId = localStorage.getItem("zaraaa_msg_id") || null;

            // Reset ID tiap hari baru supaya memicu 1 notifikasi baru di pagi hari
            if (hariTerakhirDisimpan !== hariIni) {
                existingMessageId = null;
                localStorage.removeItem("zaraaa_msg_id");
            }

            const payload = {
                username: "Zaraaa Live Dashboard",
                avatar_url: "https://i.imgur.com/vHqB3qL.png",
                content: `⚡ **Live Update | Hari ini: ${hariIni}**`,
                embeds: [
                    {
                        title: "🟢 ZARAAA'S LIVE DASHBOARD (REALTIME)",
                        description: `📍 **Aksi Terakhir:** \`${lastAction}\`\n\n` +
                                     `📊 **Status Aktivitas:**\n**${currentMood}**\n\n` +
                                     `📈 **Radar Kangen:**\n**${currentLevelKangen}**\n\n` +
                                     `🚨 **Sinyal Darurat:**\n**${sinyalDarurat}**\n\n` +
                                     `📡 **Love Buzzer:**\n*${loveBuzzerStatus}*\n\n` +
                                     `📌 **Memo Masuk:**\n> ${catatanTerakhir}`,
                        color: 16742314,
                        footer: {
                            text: `Sinkronisasi Instan Sukses pada [ ${waktuUpdate} WIB ]`
                        }
                    }
                ]
            };

            try {
                let url = DISCORD_WEBHOOK_URL;
                let method = "POST";

                if (existingMessageId) {
                    url = `${DISCORD_WEBHOOK_URL}/messages/${existingMessageId}`;
                    method = "PATCH";
                } else {
                    url = `${DISCORD_WEBHOOK_URL}?wait=true`;
                }

                const response = await fetch(url, {
                    method: method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    if (!existingMessageId) {
                        const resData = await response.json();
                        localStorage.setItem("zaraaa_msg_id", resData.id);
                        localStorage.setItem("zaraaa_last_date", hariIni);
                    }
                } else if (response.status === 404 && existingMessageId) {
                    // Proteksi jika pesan tidak sengaja terhapus di Discord
                    localStorage.removeItem("zaraaa_msg_id");
                    sinkronkanKeDiscord();
                }
            } catch (err) {
                console.error("Gagal sinkronisasi:", err);
            }
        }

        window.onload = function() {
            jalankanJamRealtime();
            sinkronkanKeDiscord();
        };
    </script>
</body>
</html>
